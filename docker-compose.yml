services:
  app:
    build: ./backend
    container_name: app_container
    ports:
      - "80:5000"
    depends-on:
      mongo:
    environment:
      - MONGO_URI=mongodb://mongo:27017/usersdb
      - PORT=5000
    
  mongo:
    image: mongo
    container_name: mongo_container
    volumes: mongo_data

volumes:
  mongo_data:
