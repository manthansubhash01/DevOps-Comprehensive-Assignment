services:
  mongo:
    image: mongo
    container_name: mongo_container
    volumes: mongo_data
    restart: unless-stopped
  app:
    build: ./backend
    container_name: app_container
    ports:
      - "80:5000"
    depends_on: 
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/usersdb
      - PORT=5000
    restart: unless-stopped

volumes:
  mongo_data:
